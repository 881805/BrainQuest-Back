name: CI Pipeline

on:
  push:
    branches: [ QA ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: brainquest
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Levantar aplicación
        env:
          DB_URL: jdbc:mariadb://localhost:3306/brainquest
          DB_USERNAME: root
          DB_PASSWORD: root

          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}

          GEMINI_BASEURL: ${{ secrets.GEMINI_BASEURL }}

          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

          SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD }}
          AI_PASSWORD: ${{ secrets.AI_PASSWORD }}

        run: |
          ./gradlew bootRun --args='--spring.profiles.active=test' &
          
          echo "Esperando a que el servidor esté listo..."
          for i in {1..30}; do
            curl -s http://localhost:8080/actuator/health && break
            sleep 2
          done

      - name: Ejecutar build
        run: ./gradlew build
