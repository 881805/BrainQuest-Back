name: CI Pipeline

on:
  push:
    branches: [ QA ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Dar permisos a gradlew
        run: chmod +x gradlew

      - name: Levantar aplicación
        run: |
          ./gradlew bootRun &
          sleep 20

      - name: Ejecutar build y pruebas unitarias
        run: ./gradlew build
